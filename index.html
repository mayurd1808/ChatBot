<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Query Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">AI Internship Assessment</p>
      <h1>Course Query Chatbot</h1>
      <p class="subtitle">
        Ask about fees, duration, syllabus, eligibility, timings, learning mode, certification, or contact details.
      </p>
    </section>

    <section class="chat-shell">
      <div class="chat-header">
        <div>
          <h2>CourseBot</h2>
          <p>Answers course-related queries instantly</p>
        </div>
        <button id="clear-chat" type="button" class="secondary-button">Clear chat</button>
      </div>

      <div id="chat-messages" class="chat-messages" aria-live="polite"></div>

      <div class="quick-questions">
        <button type="button" class="chip">What is the fee for AI Foundations Bootcamp?</button>
        <button type="button" class="chip">Show me the syllabus for Automation with Python</button>
        <button type="button" class="chip">What are the timings for Data Science Career Program?</button>
        <button type="button" class="chip">How can I contact admissions?</button>
      </div>

      <form id="chat-form" class="chat-form">
        <label class="sr-only" for="user-input">Ask a question</label>
        <input
          id="user-input"
          name="user-input"
          type="text"
          placeholder="Type your question here..."
          autocomplete="off"
        >
        <button type="submit" class="primary-button">Send</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
